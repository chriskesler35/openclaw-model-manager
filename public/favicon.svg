<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Dark background -->
  <rect width="64" height="64" rx="14" fill="#12141e"/>
  
  <!-- Outer glow ring -->
  <circle cx="32" cy="32" r="26" fill="none" stroke="#3b82f6" stroke-width="1.5" opacity="0.3"/>
  
  <!-- Claw body -->
  <g transform="translate(32, 38)">
    <!-- Left pincer -->
    <path d="M-6 -4 Q-14 -16 -8 -22 Q-4 -26 0 -20 Q2 -14 -2 -8 Z" 
          fill="#ef4444" stroke="#b91c1c" stroke-width="1"/>
    <!-- Right pincer -->
    <path d="M6 -4 Q14 -16 8 -22 Q4 -26 0 -20 Q-2 -14 2 -8 Z" 
          fill="#ef4444" stroke="#b91c1c" stroke-width="1"/>
    <!-- Center joint -->
    <circle cx="0" cy="-4" r="4" fill="#dc2626"/>
  </g>
  
  <!-- Lightning bolt -->
  <path d="M35 10 L28 30 L35 28 L27 46" 
        fill="none" stroke="#fbbf24" stroke-width="3.5" 
        stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Status indicator dot -->
  <circle cx="52" cy="12" r="6" fill="#12141e"/>
  <circle cx="52" cy="12" r="4.5" fill="#22c55e"/>
</svg>
